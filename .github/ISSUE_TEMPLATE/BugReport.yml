name: Bug 反馈
description: 游戏中遇到崩溃、卡顿、显示异常、兼容问题或行为不符合预期。
title: "[问题] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈！

        标题不用写得很标准，也不需要自己判断分类、难度、优先级或标签。你只要把遇到的现象、使用版本、复现方式和截图/日志尽量写清楚即可；我们会在整理时统一改标题、加标签、拆分或合并 issue。

        如果你不确定这是 Bug、兼容问题还是使用困惑，也可以直接写在这里。

  - type: checkboxes
    id: checklist
    attributes:
      label: 简单确认
      description: 提交前请尽量确认以下内容。
      options:
        - label: 我已经在 Issues 页面简单搜索过，确认没有明显重复的问题。
          required: true

  - type: textarea
    id: what-happened
    attributes:
      label: 实际发生了什么？
      description: 描述你看到的异常现象。可以贴截图、录屏、日志片段，越具体越好。
      placeholder: 例如：进入 RTS 后右键某个机器，UI 闪一下就消失；或者选择物品后无法继续放置。
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 你原本期望怎样？
      description: 简单说明你认为正常情况下应该发生什么。
    validations:
      required: false

  - type: textarea
    id: reproduce-steps
    attributes:
      label: 如何复现？
      description: 如果可以复现，请写出操作步骤；如果不稳定，也可以写“大概在什么情况下出现”。
      placeholder: |
        1. 进入世界
        2. 打开 RTS
        3. 点击/右键/选择……
        4. 出现……
    validations:
      required: false

  - type: input
    id: mod_version
    attributes:
      label: RTSBuilding 版本
      description: 例如 1.1.0、1.0.5、0.0.5；如果不确定，也可以写“不确定”。
      placeholder: 例如：1.1.0
    validations:
      required: true

  - type: input
    id: minecraft_loader
    attributes:
      label: Minecraft / Loader 版本
      description: 写出 Minecraft 版本和加载器，例如 1.21.1 NeoForge 或 1.20.1 Forge。
      placeholder: 例如：1.21.1 NeoForge
    validations:
      required: true

  - type: textarea
    id: modpack
    attributes:
      label: 整合包 / 相关模组
      description: 如果是在整合包中出现，请写整合包名称；如果与某个模组有关，也请写出模组名。
      placeholder: 例如：ATM9、Create、Sophisticated Backpacks、GregTech Modern……
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 日志或崩溃报告（可选）
      description: 如果有 crash report、latest.log 或服务端日志，请粘贴关键片段，或上传文件/链接。
      render: shell
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: 其他补充（可选）
      description: 任何你觉得有帮助的上下文都可以写在这里。
    validations:
      required: false
