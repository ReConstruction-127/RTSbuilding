<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0e14">
<title>RTS Building Benchmark 可视化趋势</title>
<link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- ── Header ── -->
<div class="header">
  <div class="header-left">
    <div class="header-icon">📊</div>
    <div class="header-text">
      <h1>Benchmark 性能趋势</h1>
      <div class="subtitle" id="subtitle"><span id="serverBadge"></span></div>
    </div>
  </div>
</div>

<!-- ── Stats Bar ── -->
<div class="stats-bar" id="statsBar"></div>

<!-- ── Empty State (content built by JS) ── -->
<div id="emptyState" class="empty-state" style="display:none"></div>

<!-- ── Main Content ── -->
<div id="mainContent" style="display:none">
  <div class="tabs" id="tabBar"></div>
  <div id="tabContent"></div>
</div>

<!-- ── Footer ── -->
<div class="footer">
  <span>📦 SQLite</span><span class="sep">·</span>
  <span>🔄 BenchmarkServer</span><span class="sep">·</span>
  <span>📈 Chart.js</span><span class="sep">·</span>
  <span>RTS Building Mod</span>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
